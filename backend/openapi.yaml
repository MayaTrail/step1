openapi: 3.0.3

info:
  title: MayaTrail API
  version: 1.0.0
  description: |
    Backend API for the MayaTrail cloud-security simulation platform.

    **Authentication**: All endpoints (except `/api/auth/register` and `/api/auth/login`)
    require a JWT Bearer token obtained via the login endpoint.
  contact:
    name: MayaTrail Team

servers:
  - url: http://localhost:8000
    description: Local development (Docker Compose)

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Pass the access token returned by POST /api/auth/login
        in the `Authorization: Bearer <token>` header.

  # -----------------------------------------------------------------------
  # Reusable schemas
  # -----------------------------------------------------------------------
  schemas:

    # ---- Auth / Users ---------------------------------------------------
    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          example: himan10
        email:
          type: string
          format: email
          example: himan10@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: superSecret123

    RegisterResponse:
      type: object
      properties:
        username:
          type: string
          example: himan10
        email:
          type: string
          example: himan10@example.com

    TokenRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: himan10
        password:
          type: string
          format: password
          example: superSecret123

    TokenResponse:
      type: object
      properties:
        access:
          type: string
          description: Short-lived JWT access token (1 hour).
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refresh:
          type: string
          description: Long-lived refresh token (7 days).
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    TokenRefreshRequest:
      type: object
      required: [refresh]
      properties:
        refresh:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    TokenRefreshResponse:
      type: object
      properties:
        access:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    UserProfile:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: himan10
        email:
          type: string
          example: himan10@example.com
        first_name:
          type: string
          example: Himanshu
        last_name:
          type: string
          example: ""
        date_joined:
          type: string
          format: date-time
          example: "2026-02-27T16:30:00Z"

    # ---- Infrastructure (Stacks) ----------------------------------------
    Stack:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        name:
          type: string
          example: dev-himan10
        region:
          type: string
          example: us-east-1
        status:
          type: string
          enum:
            - pending
            - deploying
            - ready
            - destroying
            - refreshing
            - failed
            - ec2_booting
            - ready_for_attack
            - attacking
            - attack_complete
            - destroyed
          example: pending
        outputs:
          type: object
          additionalProperties: true
          example: {}
        owner:
          type: string
          description: Username of the owner (read-only, via StringRelatedField).
          example: himan10
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StackCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: dev-himan10
        region:
          type: string
          default: us-east-1
          example: us-west-2

    StackActionResponse:
      type: object
      properties:
        stack:
          $ref: "#/components/schemas/Stack"
        task_id:
          type: string
          description: Celery task ID for tracking the async operation.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890

    # ---- Emulations (Enterprise) ----------------------------------------
    Technique:
      type: object
      properties:
        id:
          type: string
          example: T1562.008
        name:
          type: string
          example: Disable Cloud Logs

    AttackPhase:
      type: object
      properties:
        phase:
          type: integer
          example: 4
        name:
          type: string
          example: Defense Evasion
        techniques:
          type: array
          items:
            $ref: "#/components/schemas/Technique"

    MitreMapping:
      type: object
      properties:
        id:
          type: string
          example: T1562.008
        name:
          type: string
          example: Disable Cloud Logs
        tactic:
          type: string
          example: Defense Evasion
        platform:
          type: string
          example: AWS CloudTrail
        description:
          type: string

    Reference:
      type: object
      properties:
        icon:
          type: string
          example: ">"
        title:
          type: string
        source:
          type: string
        type:
          type: string
          example: REPORT
        color:
          type: string
          example: cyan

    EmulationPackage:
      type: object
      description: Enterprise emulation package. Fields are camelCase to match the frontend TypeScript type.
      properties:
        id:
          type: string
          description: Emulation package name — used as the URL identifier.
          example: scarleteel
        name:
          type: string
          description: Human-readable display name.
          example: SCARLETEEL 2.0
        description:
          type: string
        tier:
          type: string
          enum: [enterprise]
        origin:
          type: string
          example: unknown
        originLabel:
          type: string
          example: APT EMULATION
        tags:
          type: array
          items:
            type: string
        techniqueCount:
          type: integer
          example: 8
        severity:
          type: string
          enum: [CRITICAL, HIGH, MEDIUM, LOW]
        aliases:
          type: string
        attribution:
          type: string
        activeSince:
          type: string
        targets:
          type: string
        incidents:
          type: array
          items:
            type: string
        attackPath:
          type: array
          items:
            $ref: "#/components/schemas/AttackPhase"
        mitreMappings:
          type: array
          items:
            $ref: "#/components/schemas/MitreMapping"
        references:
          type: array
          items:
            $ref: "#/components/schemas/Reference"
        phaseCount:
          type: integer
          example: 6
        schemaVersion:
          type: integer
          example: 1

    EmulationEstimate:
      type: object
      properties:
        emulationType:
          type: string
          example: scarleteel
        displayName:
          type: string
          example: SCARLETEEL 2.0
        resources:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              count:
                type: integer
              cost_per_hour_usd:
                type: number
        totalCostPerHourUsd:
          type: number
          example: 0.05
        defaultTtlHours:
          type: integer
          example: 4
        estimatedTotalUsd:
          type: number
          example: 0.2
        note:
          type: string

    DetectionRule:
      type: object
      properties:
        title:
          type: string
          description: Filename of the detection rule (e.g. sigma_t1562_008.yml).
          example: sigma_t1562_008.yml
        code:
          type: string
          description: Full rule content — SIGMA YAML or KQL query string.

    EmulationDetections:
      type: object
      properties:
        emulationType:
          type: string
          example: scarleteel
        displayName:
          type: string
          example: SCARLETEEL 2.0
        sigma:
          type: array
          items:
            $ref: "#/components/schemas/DetectionRule"
        kql:
          type: array
          items:
            $ref: "#/components/schemas/DetectionRule"
        totalCount:
          type: integer
          example: 12
        formats:
          type: string
          example: "SIGMA (6) · KQL (6)"

    EmulationPlaybook:
      type: object
      properties:
        emulationType:
          type: string
          example: scarleteel
        displayName:
          type: string
          example: SCARLETEEL 2.0
        content:
          type: string
          description: Full PLAYBOOK.md markdown content.

    EmulationTechniques:
      type: object
      properties:
        emulationType:
          type: string
        displayName:
          type: string
        attackPath:
          type: array
          items:
            $ref: "#/components/schemas/AttackPhase"
        mitreMappings:
          type: array
          items:
            $ref: "#/components/schemas/MitreMapping"
        techniqueCount:
          type: integer

    DeployEmulationRequest:
      type: object
      required: [emulation_type, stack_name]
      properties:
        emulation_type:
          type: string
          description: Emulation package name (must match a registered MANIFEST).
          example: scarleteel
        stack_name:
          type: string
          description: Pulumi stack name for this deployment.
          example: scarleteel-himan10

    DeployEmulationResponse:
      type: object
      properties:
        stackId:
          type: string
          format: uuid
        stackName:
          type: string
          example: scarleteel-himan10

    TriggerAttackResponse:
      type: object
      properties:
        runId:
          type: string
          format: uuid
        stackId:
          type: string
          format: uuid

    EmulationRun:
      type: object
      properties:
        id:
          type: string
          format: uuid
        stack:
          type: string
          format: uuid
        emulation_type:
          type: string
          example: scarleteel
        status:
          type: string
          enum: [pending, running, completed, failed]
        phase_current:
          type: integer
        phase_total:
          type: integer
        stdout:
          type: string
        stderr:
          type: string
        triggered_by:
          type: string
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    # ---- Logs -----------------------------------------------------------
    LogEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        level:
          type: string
          enum: [info, warning, error]
          example: info
        event:
          type: string
          enum:
            - stack.deployed
            - stack.destroyed
            - emulation.started
            - emulation.completed
            - emulation.failed
          example: stack.deployed
        message:
          type: string
          example: "Stack dev-himan10 deployed successfully."
        actor:
          type: string
          nullable: true
          description: Username of the user who caused this event.
          example: himan10
        stack:
          type: string
          format: uuid
          nullable: true
        timestamp:
          type: string
          format: date-time

    # ---- Common ---------------------------------------------------------
    ValidationError:
      type: object
      additionalProperties:
        type: array
        items:
          type: string
      example:
        username: ["This field is required."]

    DetailError:
      type: object
      properties:
        detail:
          type: string
          example: "Authentication credentials were not provided."

  # -----------------------------------------------------------------------
  # Reusable responses
  # -----------------------------------------------------------------------
  responses:
    Unauthorized:
      description: Authentication credentials were not provided or are invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DetailError"

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:

  # ======================= Auth ==========================================

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: authRegister
      security: []   # public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          description: Validation errors (duplicate username, weak password, etc.).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Obtain JWT token pair
      operationId: authLogin
      security: []   # public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRequest"
      responses:
        "200":
          description: Token pair returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh an access token
      operationId: authRefresh
      security: []   # only the refresh token is needed in the body
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRefreshRequest"
      responses:
        "200":
          description: New access token returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenRefreshResponse"
        "401":
          description: Refresh token is invalid or expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      operationId: authMe
      responses:
        "200":
          description: Authenticated user's profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"

  # ======================= Stacks ========================================

  /api/stacks/:
    get:
      tags: [Stacks]
      summary: List all stacks owned by the current user
      operationId: stacksList
      responses:
        "200":
          description: Array of stacks.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Stack"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Stacks]
      summary: Create a new stack
      operationId: stacksCreate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StackCreateRequest"
      responses:
        "201":
          description: Stack created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stack"
        "400":
          description: Validation error (e.g. duplicate name).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/stacks/{id}/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Stacks]
      summary: Retrieve a stack
      operationId: stacksRetrieve
      responses:
        "200":
          description: Stack details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stack"
        "404":
          description: Stack not found.
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags: [Stacks]
      summary: Delete a stack record
      operationId: stacksDelete
      responses:
        "204":
          description: Stack deleted.
        "404":
          description: Stack not found.
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/stacks/{id}/deploy/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Stacks]
      summary: Deploy a stack (async Pulumi up)
      operationId: stacksDeploy
      description: >
        Enqueues a Celery task that spawns a Pulumi container to run `pulumi up`.
        Returns immediately with 202 and includes the Celery task_id for polling.
        Returns 409 if the stack is already deploying, destroying, or refreshing.
      responses:
        "202":
          description: Deploy task enqueued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StackActionResponse"
        "409":
          description: Stack is busy (deploying, destroying, or refreshing).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/stacks/{id}/destroy/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Stacks]
      summary: Destroy a stack (async Pulumi destroy)
      operationId: stacksDestroy
      description: >
        Enqueues a Celery task that spawns a Pulumi container to run `pulumi destroy`.
        Returns immediately with 202 and includes the Celery task_id.
        Returns 409 if the stack is already deploying, destroying, or refreshing.
      responses:
        "202":
          description: Destroy task enqueued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StackActionResponse"
        "409":
          description: Stack is busy (deploying, destroying, or refreshing).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/stacks/{id}/refresh/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Stacks]
      summary: Refresh a stack (async Pulumi refresh)
      operationId: stacksRefresh
      description: >
        Enqueues a Celery task that spawns a Pulumi container to run `pulumi refresh`.
        Syncs the Pulumi state with the actual cloud resources without making any
        infrastructure changes. Useful after manual changes in the AWS console.
        Returns 409 if the stack is already deploying, destroying, or refreshing.
      responses:
        "202":
          description: Refresh task enqueued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StackActionResponse"
        "409":
          description: Stack is busy (deploying, destroying, or refreshing).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/stacks/{id}/preview/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Stacks]
      summary: Preview stack changes (async Pulumi preview)
      operationId: stacksPreview
      description: >
        Enqueues a Celery task that spawns a Pulumi container to run `pulumi preview`.
        This is a read-only operation that shows what changes would be made without
        actually deploying. The stack status is not modified.
        Returns 409 if the stack is already deploying, destroying, or refreshing.
      responses:
        "202":
          description: Preview task enqueued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StackActionResponse"
        "409":
          description: Stack is busy (deploying, destroying, or refreshing).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ======================= Emulations (Enterprise) =======================

  /api/emulations/:
    get:
      tags: [Emulations]
      summary: List available emulation packages
      operationId: emulationsList
      description: >
        Returns all registered emulation packages from the registry.
        Fields are camelCase to match the frontend Emulation TypeScript type.
        Requires IsEnterpriseUser — returns 403 for demo and unauthenticated users.
      responses:
        "200":
          description: Array of emulation packages.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmulationPackage"
        "403":
          description: Not an enterprise user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/emulations/deploy/:
    post:
      tags: [Emulations]
      summary: Deploy an enterprise emulation stack
      operationId: emulationsDeploy
      description: >
        Creates a Stack record and enqueues `pulumi up` via the enterprise Celery queue.
        Returns 409 if the user already has an active emulation stack.
        Poll GET /api/stacks/{id}/ to track status: deploying → ec2_booting → ready_for_attack.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeployEmulationRequest"
      responses:
        "202":
          description: Deploy task enqueued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeployEmulationResponse"
        "400":
          description: Validation error (unknown emulation_type, missing fields).
        "409":
          description: User already has an active emulation stack.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"
        "403":
          description: Not an enterprise user.
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/emulations/{emulation_type}/estimate/:
    parameters:
      - name: emulation_type
        in: path
        required: true
        schema:
          type: string
          example: scarleteel
    get:
      tags: [Emulations]
      summary: Cost estimate for an emulation type
      operationId: emulationsEstimate
      description: >
        Returns the pre-deployment cost breakdown read from the emulation MANIFEST.
        No AWS API calls are made. The frontend shows this before POST /deploy/.
      responses:
        "200":
          description: Cost breakdown.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmulationEstimate"
        "404":
          description: Unknown emulation type.
        "403":
          description: Not an enterprise user.
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/emulations/{emulation_type}/techniques/:
    parameters:
      - name: emulation_type
        in: path
        required: true
        schema:
          type: string
          example: scarleteel
    get:
      tags: [Emulations]
      summary: MITRE ATT&CK techniques for an emulation
      operationId: emulationsTechniques
      description: >
        Returns the kill-chain attack path and full MITRE ATT&CK technique mappings
        directly from the emulation MANIFEST. Served from the in-memory registry cache.
      responses:
        "200":
          description: Technique data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmulationTechniques"
        "404":
          description: Unknown emulation type.
        "403":
          description: Not an enterprise user.
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/emulations/{emulation_type}/detections/:
    parameters:
      - name: emulation_type
        in: path
        required: true
        schema:
          type: string
          example: scarleteel
    get:
      tags: [Emulations]
      summary: SIGMA and KQL detection rules for an emulation
      operationId: emulationsDetections
      description: >
        Reads .yml (SIGMA) and .kql (KQL) files from the emulation's detections/
        subdirectory and returns their content verbatim. For SCARLETEEL: 6 SIGMA
        rules + 6 KQL queries = 12 total, one pair per MITRE technique.
      responses:
        "200":
          description: Detection rules.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmulationDetections"
        "404":
          description: Unknown emulation type.
        "403":
          description: Not an enterprise user.
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/emulations/{emulation_type}/playbook/:
    parameters:
      - name: emulation_type
        in: path
        required: true
        schema:
          type: string
          example: scarleteel
    get:
      tags: [Emulations]
      summary: IR playbook for an emulation
      operationId: emulationsPlaybook
      description: >
        Reads PLAYBOOK.md from the emulation package directory and returns the
        raw markdown content. The frontend parses H2 sections (## Title) into
        structured steps for display in PlaybookPage.
      responses:
        "200":
          description: Playbook content.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmulationPlaybook"
        "404":
          description: Unknown emulation type or PLAYBOOK.md not found.
        "403":
          description: Not an enterprise user.
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/emulations/{run_id}/:
    parameters:
      - name: run_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Emulations]
      summary: Poll an EmulationRun status
      operationId: emulationsRunDetail
      description: >
        Returns the EmulationRun record with current status, phase progress,
        and captured stdout/stderr. Poll until status is 'completed' or 'failed'.
      responses:
        "200":
          description: EmulationRun details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmulationRun"
        "404":
          description: Run not found or not owned by the caller.
        "403":
          description: Not an enterprise user.
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/emulations/{stack_id}/attack/:
    parameters:
      - name: stack_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Emulations]
      summary: Trigger the attack phase
      operationId: emulationsAttack
      description: >
        Creates an EmulationRun and enqueues run_emulation_attack in the enterprise
        Celery queue. The stack must be in ready_for_attack status.
        Returns 409 if the stack is not ready.
      responses:
        "202":
          description: Attack task enqueued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TriggerAttackResponse"
        "404":
          description: Stack not found.
        "409":
          description: Stack is not in ready_for_attack status.
        "403":
          description: Not an enterprise user.
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/emulations/{stack_id}/destroy/:
    parameters:
      - name: stack_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Emulations]
      summary: Destroy an emulation stack
      operationId: emulationsDestroy
      description: >
        Enqueues `pulumi destroy` for an enterprise emulation stack.
        Returns 409 if the stack is currently deploying, destroying, or attacking.
      responses:
        "202":
          description: Destroy task enqueued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailError"
        "404":
          description: Stack not found.
        "409":
          description: Stack is busy.
        "403":
          description: Not an enterprise user.
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ======================= Logs ==========================================

  /api/logs/:
    get:
      tags: [Logs]
      summary: List audit log entries for the current user
      operationId: logsList
      description: >
        Returns log entries where the user is the actor, or the entry
        references a stack/run owned by the user.
      responses:
        "200":
          description: Array of log entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/logs/{id}/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Logs]
      summary: Retrieve a single log entry
      operationId: logsRetrieve
      responses:
        "200":
          description: Log entry details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogEntry"
        "404":
          description: Log entry not found.
        "401":
          $ref: "#/components/responses/Unauthorized"
