worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    server_tokens off;

    # Use Docker's embedded DNS so container-IP changes are picked up
    # automatically (valid=10s keeps a short TTL).
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Content-Type-Options  "nosniff"                always;
        add_header X-Frame-Options         "SAMEORIGIN"             always;
        add_header X-XSS-Protection        "1; mode=block"          always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

        # Streaming AI chat → backend (no buffering).
        # Regex matches before the /api/ prefix below, so token deltas reach the
        # browser as they are produced instead of being buffered into one blob.
        location ~ ^/api/ai/conversations/.+/messages/?$ {
            set $backend_stream http://backend:8000;
            proxy_pass $backend_stream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            chunked_transfer_encoding on;
        }

        # API + Admin → backend
        # Using variables forces nginx to re-resolve on every request.
        location /api/ {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /admin/ {
            set $backend_upstream_admin http://backend:8000;
            proxy_pass $backend_upstream_admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Everything else → UI
        location / {
            set $ui_upstream http://ui:8080;
            proxy_pass $ui_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
