<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MayaTrail — APT Emulation Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Inter: primary font for all UI text -->
  <!-- Geist Mono: monospace font for code and technical content -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script>
    // Apply saved theme before paint to prevent flash
    (function () {
      var t = localStorage.getItem('mayatrail_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <!-- Google Identity Services — required for "Continue with Google" auth -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
