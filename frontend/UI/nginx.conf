worker_processes auto;

# PID file in writable location for non-root
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # ── Core Settings ──
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Temp paths writable by non-root user
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # ── Security ──
    server_tokens off;

    # ── Logging ──
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 8080;
        server_name _;

        root   /usr/share/nginx/html;
        index  index.html;

        # ── Security Headers ──
        add_header X-Content-Type-Options  "nosniff"                always;
        add_header X-Frame-Options         "SAMEORIGIN"             always;
        add_header X-XSS-Protection        "1; mode=block"          always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'" always;

        # ── Health Check Endpoint ──
        location = /health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # ── Static Assets with Cache ──
        location ~* \.(css|js)$ {
            expires 1h;
            add_header Cache-Control "public, no-transform";
        }

        location ~* \.(ico|gif|png|jpg|jpeg|svg|webp|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }

        # ── API Proxy / Passthrough ──
        # When running standalone (no edge proxy), return 502 for API calls
        # so the SPA fallback doesn't serve index.html as a JSON response.
        # In docker-compose, the edge nginx routes /api/ to the backend
        # before it ever reaches this container.
        location /api/ {
            # If BACKEND_URL is set (via envsubst), proxy to backend.
            # Otherwise return 502 to signal "backend not available".
            return 502 '{"detail":"Backend API not available. Run with docker-compose for full stack."}';
            add_header Content-Type application/json always;
        }

        # ── Block Hidden Files (.git, .env, .dockerignore, etc.) ──
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── SPA Fallback: serve index.html for all routes (React Router) ──
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
