<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MayaTrail — Emulate real-world APT attack paths in your AWS cloud and get detection rules, IR playbooks, MITRE ATT&CK mappings, and organizational guardrails." />
  <title>MayaTrail — APT Emulation for Cloud Security</title>

  <!-- Fonts: Outfit (display) + Space Grotesk (body) + JetBrains Mono (monospace) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Custom CSS (all styling lives here — no Tailwind needed) -->
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body>

  <!-- Pulsing viewport border overlay -->
  <div id="dangerBorder" class="danger-border-overlay"></div>

  <!-- React mount point -->
  <div id="root"></div>

  <!-- React 18 (production CDN) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Components -->
  <script src="components/Navbar.js"></script>
  <script src="components/Hero.js"></script>
  <script src="components/Features.js"></script>
  <script src="components/HowItWorks.js"></script>
  <script src="components/MitreSection.js"></script>
  <script src="components/Services.js"></script>
  <script src="components/CTA.js"></script>
  <script src="components/Footer.js"></script>

  <!-- App entry point -->
  <script>
    function App() {
      var _useState = React.useState(false);
      var isProtected = _useState[0];
      var setIsProtected = _useState[1];

      function handleToggle() {
        var next = !isProtected;
        setIsProtected(next);

        // Update the viewport border overlay (outside React tree)
        var border = document.getElementById('dangerBorder');
        if (border) {
          if (next) border.classList.add('safe');
          else border.classList.remove('safe');
        }
      }

      return React.createElement(React.Fragment, null,
        React.createElement(Navbar, { isProtected: isProtected }),
        React.createElement('main', null,
          React.createElement(HeroSection, { isProtected: isProtected, onToggle: handleToggle }),
          React.createElement(FeaturesSection),
          React.createElement(HowItWorksSection),
          React.createElement(MitreSection),
          React.createElement(ServicesSection),
          React.createElement(CTASection)
        ),
        React.createElement(Footer)
      );
    }

    var root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));

    // ── SCROLL REVEAL ──
    // Use MutationObserver to attach IntersectionObserver after React renders
    function initScrollReveal() {
      var revealElements = document.querySelectorAll('.reveal');
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry, i) {
          if (entry.isIntersecting) {
            setTimeout(function() {
              entry.target.classList.add('visible');
            }, i * 80);
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

      revealElements.forEach(function(el) { observer.observe(el); });
    }

    // Wait for React to mount then init
    setTimeout(initScrollReveal, 100);

    // Also re-init if content changes (SPA-style)
    var mutationObserver = new MutationObserver(function() {
      initScrollReveal();
    });
    mutationObserver.observe(document.getElementById('root'), {
      childList: true, subtree: true
    });

    // ── SMOOTH ANCHOR SCROLL ──
    document.addEventListener('click', function(e) {
      var anchor = e.target.closest('a[href^="#"]');
      if (anchor) {
        e.preventDefault();
        var target = document.querySelector(anchor.getAttribute('href'));
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  </script>
</body>
</html>
