title: Codefinger - Ransom Note Deposition in S3 (README.txt Multi-Prefix)
id: e6a1c4f9-37b5-4d0e-d3a2-9c5f7e2b4d0a
status: experimental
description: |
  Detects the deposition of ransom note objects (README.txt) in multiple S3 prefixes
  simultaneously -- a confirmatory indicator that an active ransomware campaign is in
  progress. Codefinger drops a ransom note per affected directory immediately after
  re-encrypting objects in that prefix with SSE-C. A single README.txt upload is low signal;
  identical filenames appearing in 2+ distinct prefixes within minutes is high-confidence.
references:
    - https://attack.mitre.org/techniques/T1486/
author: MayaTrail
date: 2026/04/15
tags:
    - attack.impact
    - attack.t1486
logsource:
    product: aws
    service: cloudtrail
detection:
    selection_ransom_note:
        eventSource: 's3.amazonaws.com'
        eventName: 'PutObject'
        requestParameters|contains: 'README.txt'
    filter_documentation:
        # Exclude known legitimate README uploads (e.g., documentation pipelines)
        userAgent|contains:
            - 'aws-amplify'
            - 'github-actions-s3-sync'
    condition: selection_ransom_note and not filter_documentation
falsepositives:
    - Static website deployments that publish README.txt as documentation
    - S3-backed artifact repositories where README.txt is a standard file
level: high
