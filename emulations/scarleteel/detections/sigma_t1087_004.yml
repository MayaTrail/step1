title: SCARLETEEL Phase 3 — IAM Enumeration Burst from Single Principal
id: c3d4e5f6-3333-4ccc-b333-333333333333
status: experimental
description: |
  Detects a high volume of IAM read operations in a short window, consistent
  with an attacker performing automated privilege discovery after gaining initial
  access.  SCARLETEEL used the stolen IMDSv1 credentials to enumerate IAM users,
  roles, policies, and S3 buckets before disabling CloudTrail.
references:
  - https://sysdig.com/blog/cloud-breach-terraform-data-theft/
  - https://attack.mitre.org/techniques/T1087/004/
author: MayaTrail Security Research
date: 2024/01/01
tags:
  - attack.discovery
  - attack.t1087.004
  - attack.t1580
logsource:
  product: aws
  service: cloudtrail
detection:
  selection:
    eventSource|contains:
      - 'iam.amazonaws.com'
      - 's3.amazonaws.com'
      - 'secretsmanager.amazonaws.com'
    eventName|contains:
      - 'List'
      - 'Describe'
      - 'Get'
  timeframe: 5m
  condition: selection | count() by userIdentity.arn > 20
falsepositives:
  - Automated compliance scanning tools (e.g. Prowler, ScoutSuite)
  - Cloud Security Posture Management (CSPM) agents performing scheduled checks
level: medium
