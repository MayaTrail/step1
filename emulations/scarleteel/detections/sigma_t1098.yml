title: SCARLETEEL Phase 6 — Lambda Function Created with Privileged IAM Role
id: f6a7b8c9-6666-4fff-b666-666666666666
status: experimental
description: |
  Detects a Lambda function being created with an IAM execution role that has
  broad permissions, which is the persistence mechanism used in SCARLETEEL to
  maintain backdoor access after the container is terminated.  The combination
  of lambda:CreateFunction and attaching a privileged role is a strong signal
  when it occurs outside of known deployment pipelines.
references:
  - https://sysdig.com/blog/cloud-breach-terraform-data-theft/
  - https://attack.mitre.org/techniques/T1098/
author: MayaTrail Security Research
date: 2024/01/01
tags:
  - attack.persistence
  - attack.t1098
logsource:
  product: aws
  service: cloudtrail
detection:
  selection:
    eventSource: lambda.amazonaws.com
    eventName: CreateFunction20150331
  filter_known_pipelines:
    userAgent|contains:
      - 'aws-cli'
      - 'Terraform'
      - 'CloudFormation'
  condition: selection and not filter_known_pipelines
falsepositives:
  - Legitimate serverless deployments via unknown deployment tools
  - Developer-initiated Lambda creation from the AWS console
level: medium
