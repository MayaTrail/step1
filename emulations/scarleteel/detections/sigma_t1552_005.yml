title: SCARLETEEL Phase 2 — IMDSv1 Credential Theft via EC2 Instance Role Anomaly
id: b2c3d4e5-2222-4bbb-b222-222222222222
status: experimental
description: |
  Detects the downstream signal of IMDSv1 credential theft: an EC2 instance role
  making API calls from an IP address that is not associated with any EC2 instance
  in the account.  CloudTrail does not log IMDS requests directly, but the stolen
  credentials leaving the instance are observable as API calls from an unexpected
  source IP or user-agent.
references:
  - https://sysdig.com/blog/cloud-breach-terraform-data-theft/
  - https://attack.mitre.org/techniques/T1552/005/
  - https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/configuring-instance-metadata-service.html
author: MayaTrail Security Research
date: 2024/01/01
tags:
  - attack.credential_access
  - attack.t1552.005
logsource:
  product: aws
  service: cloudtrail
detection:
  selection:
    userIdentity.type: AssumedRole
    # EC2 instance roles have ARNs of the form:
    # arn:aws:sts::ACCOUNT:assumed-role/ROLE_NAME/i-INSTANCE_ID
    userIdentity.arn|contains: '/i-'
  filter_ec2_service:
    sourceIPAddress|endswith: '.amazonaws.com'
  filter_internal:
    sourceIPAddress|startswith:
      - '10.'
      - '172.16.'
      - '192.168.'
  condition: selection and not filter_ec2_service and not filter_internal
falsepositives:
  - EC2 instances with Elastic IPs that appear as external source IPs
  - NAT gateway egress that appears as a non-private IP
level: high
