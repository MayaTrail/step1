title: Cloud Service Discovery Burst — Lambda Enumeration (SCARLETEEL Phase 3)
id: scarleteel-t1526-lambda-enum-burst
status: stable
description: |
  Detects rapid-fire Lambda enumeration (5+ distinct Lambda read APIs within 60 seconds
  from the same principal). This is a SCARLETEEL signature — automated Lambda source code
  theft generates a burst of GetFunction, ListVersionsByFunction, GetPolicy, ListAliases,
  ListTags, and ListEventSourceMappings calls within seconds.
references:
  - https://sysdig.com/blog/cloud-breach-scarleteel/
  - https://attack.mitre.org/techniques/T1526/
author: APT Pipeline (SCARLETEEL emulation)
date: 2026-03-27
tags:
  - attack.discovery
  - attack.t1526
  - scarleteel
logsource:
  product: aws
  service: cloudtrail
detection:
  selection:
    eventSource: lambda.amazonaws.com
    eventName:
      - ListFunctions
      - GetFunction
      - ListVersionsByFunction
      - GetPolicy
      - ListAliases
      - ListTags
      - ListEventSourceMappings
  condition: selection | count() by userIdentity.arn, sourceIPAddress > 4
  timeframe: 60s
falsepositives:
  - CI/CD pipelines performing Lambda deployment validation (document known principals)
  - Infrastructure-as-code tools performing bulk Lambda enumeration
level: medium
fields:
  - eventTime
  - userIdentity.arn
  - sourceIPAddress
  - eventName
  - requestParameters.functionName
