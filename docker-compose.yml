version: "3.9"

# MayaTrail step1 — local development stack
# Services: PostgreSQL, Redis, Django backend, Celery worker,
#           Pulumi runner (build-only), React UI, Edge nginx proxy.
#
# Usage:
#   cp backend/.env.example backend/.env   # fill in SECRET_KEY & AWS creds
#   docker-compose build pulumi            # build the Pulumi image first
#   docker-compose up --build

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mayatrail
      POSTGRES_USER: mayatrail
      POSTGRES_PASSWORD: mayatrail
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mayatrail"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: mayatrail
      POSTGRES_USER: mayatrail
      POSTGRES_PASSWORD: mayatrail
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on: # waits for db and redis to be healthy before starting backend.
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.create_connection((\"localhost\",8000),2); s.close()'"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    command: >
      sh -c "python manage.py makemigrations users infrastructure simulations logs && python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120"

  # Pulumi runner — build-only image, not a long-running service.
  # The "tools" profile means it won't start with `docker-compose up`.
  # The worker spawns ephemeral containers from this image on demand.
  # Build it first: docker-compose build pulumi
  pulumi:
    build:
      context: ./src
      dockerfile: Dockerfile
    image: step1-pulumi
    profiles:
      - tools

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: mayatrail
      POSTGRES_USER: mayatrail
      POSTGRES_PASSWORD: mayatrail
      REDIS_URL: redis://redis:6379/0
      PULUMI_IMAGE: step1-pulumi
      STATE_BUCKET: mayatrail-pulumi-state
      SRC_DIR: /src
    volumes:
      # Mount Docker socket so the worker can spawn Pulumi containers.
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount src/ for simulation modules (imported in-process by simulations tasks).
      - ./src:/src:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker --loglevel=info --concurrency=2

  # ── UI (React SPA on nginx) ──────────────────────────────────────
  ui:
    build:
      context: ./frontend/UI
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kill -0 $(cat /tmp/nginx.pid 2>/dev/null) 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── Edge Reverse Proxy ───────────────────────────────────────────
  #  Routes / → ui:8080, /api/ + /admin/ → backend:8000
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      ui:
        condition: service_started
      backend:
        condition: service_healthy

volumes:
  postgres_data:
