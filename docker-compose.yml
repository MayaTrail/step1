version: "3.9"

# MayaTrail step1 — enterprise stack
# Services: PostgreSQL, Redis, Django backend, Celery enterprise worker,
#           Celery Beat scheduler, React UI, Edge nginx proxy.
#
# Usage:
#   cp backend/.env.example backend/.env   # fill in SECRET_KEY & AWS creds
#   docker-compose up --build

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mayatrail
      POSTGRES_USER: mayatrail
      POSTGRES_PASSWORD: mayatrail
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mayatrail"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: mayatrail
      POSTGRES_USER: mayatrail
      POSTGRES_PASSWORD: mayatrail
      REDIS_URL: redis://redis:6379/0
      EMULATIONS_BASE_DIR: /opt/emulations
    ports:
      - "8000:8000"
    volumes:
      # Mount emulations package so the API registry can discover packages.
      - ./emulations:/opt/emulations:ro
    depends_on: # waits for db and redis to be healthy before starting backend.
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.create_connection((\"localhost\",8000),2); s.close()'"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    command: >
      sh -c "python manage.py makemigrations users infrastructure emulations logs && python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120"

  # Enterprise worker — handles emulation deploy/attack/destroy tasks.
  # Runs against the user's own AWS account via STS AssumeRole.
  # No Docker socket required — Pulumi Automation API runs in-process.
  worker_enterprise:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: mayatrail
      POSTGRES_USER: mayatrail
      POSTGRES_PASSWORD: mayatrail
      REDIS_URL: redis://redis:6379/0
      STATE_BUCKET: mayatrail-state-bucket
      STATE_BUCKET_REGION: ap-south-1
      # Base directory where emulation packages are mounted.
      # Infra programs are resolved as {EMULATIONS_BASE_DIR}/{type}/infra/
      EMULATIONS_BASE_DIR: /opt/emulations
    volumes:
      # Emulation packages: attack scripts and per-emulation infra/ programs.
      - ./emulations:/opt/emulations:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker --queues=enterprise --concurrency=4 --loglevel=info

  # Celery Beat scheduler — runs auto_destroy_expired_stacks every 15 minutes.
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: mayatrail
      POSTGRES_USER: mayatrail
      POSTGRES_PASSWORD: mayatrail
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    command: >
      celery -A config beat --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # UI (React SPA on nginx)
  ui:
    build:
      context: ./frontend/UI
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kill -0 $$(cat /tmp/nginx.pid 2>/dev/null) 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Edge Reverse Proxy
  #  Routes / → ui:8080, /api/ + /admin/ → backend:8000
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      ui:
        condition: service_started
      backend:
        condition: service_healthy

volumes:
  postgres_data:
