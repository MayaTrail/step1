$kind: http-request
description: |-
  List all registered emulation packages discovered from the emulations registry.

  Returns camelCase fields matching the frontend Emulation TypeScript type.

  Expected for SCARLETEEL:
  - id: "scarleteel"
  - name: "SCARLETEEL 2.0"
  - severity: "CRITICAL"
  - techniqueCount: 8
  - schemaVersion: 1
  - attackPath: 6 phases
  - mitreMappings: 8 entries
url: "{{base_url}}/api/emulations/"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Returns array', () => pm.expect(pm.response.json()).to.be.an('array'));
      pm.test('SCARLETEEL present', () => {
          const emulations = pm.response.json();
          const scarleteel = emulations.find(e => e.id === 'scarleteel');
          pm.expect(scarleteel).to.exist;
          pm.expect(scarleteel.severity).to.equal('CRITICAL');
          pm.expect(scarleteel.techniqueCount).to.equal(8);
          pm.expect(scarleteel.schemaVersion).to.equal(1);
      });
    language: text/javascript
order: 1000
