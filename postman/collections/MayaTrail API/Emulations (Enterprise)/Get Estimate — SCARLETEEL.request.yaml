$kind: http-request
description: |-
  Return a cost breakdown for the emulation type before deployment.

  Runs `pulumi preview --json` on the worker to enumerate exact resources, then prices them via the AWS Pricing API. Falls back to static MANIFEST figures if the live estimate fails or times out (60s).

  **Response fields:**
  - `source` — 'live-preview' (from AWS Pricing API) or 'manifest-fallback' (static)
  - `resources` — per-resource cost breakdown array
  - `costDrivers` — list of resource types that drive cost (live only)
  - `warnings` — pricing warnings e.g. unknown instance type (live only)
  - `resourceCount` — number of AWS resources to be created
  - `totalCostPerHourUsd` — hourly cost
  - `defaultTtlHours` — auto-destroy TTL (4 hours for SCARLETEEL)
  - `estimatedTotalUsd` — totalCostPerHourUsd * defaultTtlHours

  Optional `?region=` query param overrides the default region for pricing.
url: "{{base_url}}/api/emulations/{{emulation_type}}/estimate/?region=ap-south-1"
method: GET
queryParams:
  - key: region
    value: ap-south-1
    description: AWS region to price for. Defaults to the Stack.region default (ap-south-1) if omitted.
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      const body = pm.response.json();
      pm.test('Has cost fields', () => {
          pm.expect(body.estimatedTotalUsd).to.be.a('number');
          pm.expect(body.defaultTtlHours).to.equal(4);
          pm.expect(body.resources).to.be.an('array').with.length.above(0);
      });
      pm.test('Has source field', () => {
          pm.expect(body.source).to.be.oneOf(['live-preview', 'manifest-fallback']);
      });
      console.log(`Estimate source: ${body.source} | Total: $${body.estimatedTotalUsd} for ${body.defaultTtlHours}h | Resources: ${body.resourceCount}`);
    language: text/javascript
order: 2000
