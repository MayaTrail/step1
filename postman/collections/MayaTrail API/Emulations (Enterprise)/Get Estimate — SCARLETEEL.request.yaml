$kind: http-request
description: |-
  Return cost breakdown for the emulation type before deployment.

  Expected: estimatedTotalUsd ~0.2, defaultTtlHours 4, 5 resource line items (EC2, Secrets Manager, Lambda, S3 x4, CloudTrail).
url: "{{base_url}}/api/emulations/{{emulation_type}}/estimate/"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      const body = pm.response.json();
      pm.test('Has cost fields', () => {
          pm.expect(body.estimatedTotalUsd).to.be.a('number');
          pm.expect(body.defaultTtlHours).to.equal(4);
          pm.expect(body.resources).to.be.an('array').with.length.above(0);
      });
    language: text/javascript
order: 2000
