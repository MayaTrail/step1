$kind: http-request
description: |-
  Deploy an enterprise emulation stack.

  Creates a Stack record with the given emulation_type, enqueues deploy_emulation_stack in the enterprise Celery queue, and stores the Celery task_id on the Stack record for progress polling.

  Enforces one-active-stack-per-user — returns 409 with the existing `stackId` if the user already has a non-terminal emulation stack.

  **Response (202):** { stackId, stackName }
  **Response (409):** { detail, stackId } — existing active stack ID

  The test script stores stackId in the `stack_id` collection variable.
url: "{{base_url}}/api/emulations/deploy/"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "emulation_type": "scarleteel",
      "stack_name": "scarleteel-testuser"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Accepted or conflict', () => {
          pm.expect(pm.response.code).to.be.oneOf([202, 409]);
      });
      if (pm.response.code === 202) {
          const body = pm.response.json();
          pm.collectionVariables.set('stack_id', body.stackId);
          pm.test('stackId captured', () => pm.expect(body.stackId).to.be.a('string'));
          pm.test('stackName present', () => pm.expect(body.stackName).to.be.a('string'));
          console.log('Stack ID:', body.stackId, '| Stack Name:', body.stackName);
          console.log('Poll GET /api/stacks/{{stack_id}}/progress/ for resource-level progress.');
          console.log('Poll GET /api/stacks/{{stack_id}}/ for status transitions (deploying -> ec2_booting -> ready_for_attack).');
      } else {
          const body = pm.response.json();
          console.log('Conflict — active stack already exists. stackId:', body.stackId);
      }
    language: text/javascript
order: 6000
