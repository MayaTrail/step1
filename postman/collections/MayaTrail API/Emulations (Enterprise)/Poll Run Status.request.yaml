$kind: http-request
description: |-
  Poll the EmulationRun status after triggering the attack.

  Run lifecycle: pending → running → completed (or failed)

  The test script logs the current phase progress and stdout tail. Re-run until status is 'completed' or 'failed'.
url: "{{base_url}}/api/emulations/{{run_id}}/"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      const body = pm.response.json();
      console.log('Run status:', body.status, '| Phase:', body.phase_current + '/' + body.phase_total);
      if (body.stdout) console.log('stdout:', body.stdout.slice(-200));
      if (body.status === 'completed') console.log('Attack complete — check stdout for results');
      if (body.status === 'failed') console.log('Attack FAILED — check stderr:', body.stderr);
    language: text/javascript
order: 9000
