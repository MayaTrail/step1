$kind: http-request
description: |-
  Poll the enterprise stack status after deployment.

  Status lifecycle: deploying → ec2_booting → ready_for_attack

  Re-run until status is 'ready_for_attack' before calling Trigger Attack. The test script logs a hint about next steps.
url: "{{base_url}}/api/stacks/{{stack_id}}/"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      const body = pm.response.json();
      pm.test('Stack has status field', () => pm.expect(body.status).to.be.a('string'));
      console.log('Current stack status:', body.status);
      if (body.status === 'ready_for_attack') {
          console.log('Stack is ready — proceed to Trigger Attack');
      } else if (body.status === 'failed') {
          console.log('Stack deployment FAILED — check Celery worker logs');
      } else {
          console.log('Still waiting... re-run this request in a few seconds');
      }
    language: text/javascript
order: 7000
