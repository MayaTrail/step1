$kind: http-request
description: |-
  Validate the reset OTP and set a new password.

  OTP is sent by POST /api/auth/forgot-password/.

  Returns: 200 { message } on success, 400 if OTP is invalid or expired.
url: "{{base_url}}/api/auth/reset-password/"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "testuser@example.com",
      "otp": "123456",
      "new_password": "NewSuperSecret123"
    }
auth:
  type: noauth
order: 9000
