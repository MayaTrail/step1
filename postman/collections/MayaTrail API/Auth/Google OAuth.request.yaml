$kind: http-request
description: |-
  Authenticate via a Google ID token and receive a MayaTrail JWT pair.

  The `id_token` is obtained by the frontend after the user completes the Google sign-in consent screen via Google Identity Services.

  No invite code or OTP verification is required for Google accounts.

  Returns: 200 { access, refresh, user } on success.
url: "{{base_url}}/api/auth/google/"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "id_token": "<Google ID token from Google Identity Services>"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 200) {
          const body = pm.response.json();
          pm.collectionVariables.set('token', body.access);
          pm.collectionVariables.set('refresh_token', body.refresh);
          pm.test('Token captured', () => pm.expect(body.access).to.be.a('string'));
          pm.test('User returned', () => pm.expect(body.user).to.be.an('object'));
      }
    language: text/javascript
order: 10000
