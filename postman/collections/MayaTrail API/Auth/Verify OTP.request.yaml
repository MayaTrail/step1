$kind: http-request
description: |-
  Verify the OTP sent during registration and activate the user account.

  Once verified, the user can call POST /api/auth/login/.

  Returns: 200 { message } on success, 400 if the OTP is invalid or expired.
url: "{{base_url}}/api/auth/register/verify-otp/"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "testuser@example.com",
      "otp": "123456"
    }
auth:
  type: noauth
order: 2000
