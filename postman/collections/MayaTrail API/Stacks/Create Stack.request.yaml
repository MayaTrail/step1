$kind: http-request
description: Create a stack record (starts in 'pending' status). Stores the returned UUID in `stack_id`.
url: "{{base_url}}/api/stacks/"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "name": "dev-testuser",
      "region": "us-east-1"
    }
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 201) {
          const body = pm.response.json();
          pm.collectionVariables.set('stack_id', body.id);
          pm.test('stack_id captured', () => pm.expect(body.id).to.be.a('string'));
      }
    language: text/javascript
order: 2000
