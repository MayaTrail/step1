$kind: http-request
description: |-
  Switch the authenticated user to demo mode.

  Demo mode can only be activated once per user — subsequent calls return 409 DEMO_ALREADY_USED.

  On success:
  - Sets `is_demo=True`
  - Sets `is_verified=False`
  - Clears `aws_role_arn`
  - Records `demo_activated_at` for TTL enforcement

  **Response (200):** { status: 'ok', is_demo: true }
  **Response (409):** { code: 'DEMO_ALREADY_USED', detail: '...' }
url: "{{base_url}}/api/connectors/demo/"
method: POST
scripts:
  - type: afterResponse
    code: |-
      pm.test('Success or already used', () => {
          pm.expect(pm.response.code).to.be.oneOf([200, 409]);
      });
      if (pm.response.code === 200) {
          pm.test('is_demo is true', () => pm.expect(pm.response.json().is_demo).to.be.true);
      } else {
          console.log('Demo already used (409):', pm.response.json().code);
      }
    language: text/javascript
order: 2000
