$kind: http-request
description: |-
  Validate an AWS IAM role ARN via STS AssumeRole.

  The server assumes the given role using its own IAM credentials — the request body only requires the role ARN. No AWS access keys should be sent.

  On success:
  - Sets `aws_role_arn` on the user profile
  - Sets `is_verified=True` and `is_enterprise=True`
  - Sets `is_demo=False`

  **Response (200):** { status: 'verified', account_id: '...' }
  **Response (400):** invalid ARN format
  **Response (422):** STS AssumeRole failed (role not assumable — check trust policy)

  Prerequisite: the IAM role must have a trust policy allowing the MayaTrail server's IAM principal.
url: "{{base_url}}/api/connectors/aws/verify/"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "role_arn": "arn:aws:iam::123456789012:role/MayaTrailEnterpriseRole"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Verified or unprocessable', () => {
          pm.expect(pm.response.code).to.be.oneOf([200, 422]);
      });
      if (pm.response.code === 200) {
          const body = pm.response.json();
          pm.test('Status is verified', () => pm.expect(body.status).to.equal('verified'));
          pm.test('account_id present', () => pm.expect(body.account_id).to.be.a('string'));
          console.log('Connected to AWS account:', body.account_id);
      } else {
          console.log('STS AssumeRole failed:', pm.response.json().message);
      }
    language: text/javascript
order: 1000
